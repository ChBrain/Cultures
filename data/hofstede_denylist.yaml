# Hofstede denylist — shared across all per-country bags.
#
# Words that may never appear in any country's bag, regardless of which
# language or dimension. The matcher does exact-word string comparison;
# polysemy and high-frequency mean these words fire on prose unrelated
# to the cultural concept they nominally signal.
#
# This is a HARD rule. Per Strategy v2, no contextual override.
#
# Per-country bags also carry a country-specific `denylist:` field for
# words rejected during that country's bootstrap (cross-language collisions,
# dialect-specific issues, etc.). The two combine: a bag word must NOT
# appear in (this global denylist) ∪ (the country's own denylist).
#
# Treatment: same as bags. Locked via SHA in data/hofstede_bag_locks.yaml,
# protected via .github/CODEOWNERS, edited only via reviewed PR.
#
# To add a word: open a chore PR with rationale in the commit message.
# To remove a word: same, plus an explicit explanation of why the word's
# polysemy or frequency issue has been resolved.


# Language policy for this repo.
#
# Single source of truth for L1b language validation (tests/validate_language.py).
# Anything previously buried in the validator's module-level constants moves here.
#
# Phase 1 of the language-hardening track. Phase 2 will add per-culture
# exception files; Phase 3 will lift this schema + the validator into the
# KAIHACKS khai package so other content repos can reuse it.

# lingua-known languages: deterministic span check via tests/validate_language.py.
# Adding a new one: also add the lingua.Language entry in _lingua_language_map
# in tests/validate_language.py, and (when keyword bags exist) the
# LINGUA_LANGUAGES entry in data/hofstede_keywords.py. All three in the same
# governance/* PR.
#
# Each culture's README declares which of these it uses via
# `**Language(s):**` -- those declarations are cross-checked against this list
# and fail loudly on typos (no silent fallback to english-only).
languages:
  - english
  - french
  - german
  - dutch
  - danish
  - polish
  - spanish
  - japanese
  - yoruba
  - mandarin
  - tamil
  - malay

# NLP-only languages: lingua-py does not support these, so they go through
# the khai_tests.review.language_faithful check instead of the lingua span
# check. The author guarantees the prose IS in the declared language;
# khai_tests.review checks it advisorily. Adding a new one requires no
# code change here -- the dispatcher in tests/validate_language.py routes
# files whose frontmatter language code maps to this list to the NLP path.
nlp_languages:
  - igbo
  - hausa
  - pidgin    # Nigerian Pidgin

# ISO 639-1 (or 639-3 where 1 doesn't exist, e.g. `pcm`) code -> language
# name. data/countries.json stores each country's language as an ISO code;
# this maps it onto the names in `languages` (lingua path) or
# `nlp_languages` (NLP path). A country whose ISO code is missing here is
# NOT unlocked: the language pre-flight gate blocks culture work on it
# until the code is mapped and the name is registered above. Every value
# must appear in either `languages` or `nlp_languages`.
iso_map:
  en: english
  fr: french
  de: german
  nl: dutch
  da: danish
  pl: polish
  es: spanish
  ja: japanese
  yo: yoruba
  zh: mandarin
  ta: tamil
  ms: malay
  ig: igbo
  ha: hausa
  pcm: pidgin

# Section headings (##) whose body gets language-checked. Names match
# case-insensitively against the heading text. Anything not listed is
# treated as structured data and skipped.
#
# This is currently an allow-list (only listed sections checked). Phase 2
# will likely invert to a deny-list so new prose sections are automatically
# covered; deferred to avoid mixing schema introduction with policy change.
prose_sections:
  - action
  - apparent
  - drives
  - load bearing
  - loses
  - offers
  - orders
  - projection
  - shadow
  - shown
  - tagline
  - tell
  - withheld
  - yearbook

# Minimum word count of a non-allowed-language span to count as a
# violation. Short spans (< this) are treated as proper nouns and ignored.
# If the validator over-fires, fix the content; do not raise this number.
min_span_words: 15

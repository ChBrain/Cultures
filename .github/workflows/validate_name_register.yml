# .github/workflows/validate_name_register.yml
#
# Runs pytest on every governance/update-name-register-* PR.
# Must pass before the PR can merge.
#
# Also runs on PRs that touch REFERENCES.md directly, so authors
# get fast feedback before a culture/* branch reaches main.

name: Validate name register

on:
  pull_request:
    branches:
      - main
    paths:
      - 'data/names/name_register.json'
      - 'regions/**/REFERENCES.md'
      - 'scripts/validate_name_register.py'
      - 'tests/test_name_register.py'

jobs:
  validate:
    name: pytest - name register
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: pytest tests/test_name_register.py -v --tb=short

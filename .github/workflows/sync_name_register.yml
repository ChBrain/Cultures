# .github/workflows/sync_name_register.yml
#
# Triggered when a culture/* branch merges to main and touches either
# a persona file or a REFERENCES.md.
#
# Opens a governance/update-name-register-{country}-{sha} PR.
# That PR must pass the validate-name-register workflow before it can merge.

name: Sync name register

on:
  push:
    branches:
      - main
    paths:
      - 'regions/**/REFERENCES.md'
      - 'regions/**/*_persona_*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed country
        id: country
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^regions/' | head -1)
          COUNTRY=$(echo "$CHANGED" | cut -d'/' -f3)
          echo "slug=$COUNTRY" >> $GITHUB_OUTPUT
          echo "Detected country: $COUNTRY"

      - name: Run sync script
        run: python scripts/sync_name_register.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/names/name_register.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create governance PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: governance/update-name-register-${{ steps.country.outputs.slug }}-${{ github.sha }}
          base: main
          commit-message: 'chore: sync name register for ${{ steps.country.outputs.slug }}'
          title: 'chore: update name register - ${{ steps.country.outputs.slug }}'
          body: |
            Automated update to `data/names/name_register.json`.

            Triggered by merge of a `culture/${{ steps.country.outputs.slug }}` branch.
            Source: `regions/**/${{ steps.country.outputs.slug }}/REFERENCES.md`

            Merging is blocked until **validate-name-register** passes.
          labels: governance
          draft: false

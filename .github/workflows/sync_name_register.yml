# .github/workflows/sync_name_register.yml
#
# Triggered when culture content merges to main and touches a persona file
# or a REFERENCES.md.
#
# Harvests persona names for each changed country and, if the name register
# changes, opens a governance/update-name-register-* PR.
# That PR must pass the validate-name-register workflow before it can merge.

name: Sync name register

on:
  push:
    branches:
      - main
    paths:
      - 'regions/**/REFERENCES.md'
      - 'regions/**/persona_*.md'
      - 'regions/**/culture_*_persona_*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed countries
        id: country
        run: |
          SLUGS=$(git diff --name-only HEAD~1 HEAD \
            | { grep '^regions/' || true; } \
            | cut -d/ -f3 | sort -u)
          ARGS=""
          FIRST=""
          for s in $SLUGS; do
            if printf '%s' "$s" | grep -qE '^[a-z_]+$'; then
              ARGS="$ARGS --country $s"
              [ -z "$FIRST" ] && FIRST="$s"
            fi
          done
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "slug=${FIRST:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Detected countries:${ARGS:- <none>}"

      - name: Run sync script
        if: steps.country.outputs.args != ''
        env:
          SYNC_ARGS: ${{ steps.country.outputs.args }}
        run: python scripts/validate_name_register.py $SYNC_ARGS

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/names/name_register.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create governance PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: governance/update-name-register-${{ steps.country.outputs.slug }}-${{ github.sha }}
          base: main
          commit-message: 'chore: sync name register for ${{ steps.country.outputs.slug }}'
          title: 'chore: update name register - ${{ steps.country.outputs.slug }}'
          body: |
            Automated update to `data/names/name_register.json`.

            Harvested persona names for culture content that merged to main.
            Detected country: `${{ steps.country.outputs.slug }}`

            Merging is blocked until **validate-name-register** passes.
          labels: governance
          draft: false

name: Build Claude.ai Zips

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zips
        run: |
          mkdir -p dist

          # engine only
          zip -r dist/engine.zip engine/

          # per region - no engine
          for region in africa americas asia europe oceania; do
            zip -r dist/cultures-${region}.zip regions/${region}/
          done

          # full - all regions, no engine
          zip -r dist/cultures-full.zip regions/

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Upload as artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cultures-zips
          path: dist/*.zip
          retention-days: 7

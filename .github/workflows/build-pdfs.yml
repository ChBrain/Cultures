name: Build PDFs by Region

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc
          pip install weasyprint

      - name: Build PDFs
        run: |
          mkdir -p dist

          for region in africa americas asia europe oceania; do
            echo "Building ${region}..."

            files=$(find regions/${region} -name "*.md" | sort)

            > /tmp/${region}_combined.md
            prev_country=""
            for f in $files; do
              country=$(echo $f | cut -d'/' -f3)
              if [ "$country" != "$prev_country" ] && [ -n "$prev_country" ]; then
                echo -e "\n---\n" >> /tmp/${region}_combined.md
              fi
              cat "$f" >> /tmp/${region}_combined.md
              echo -e "\n\n" >> /tmp/${region}_combined.md
              prev_country=$country
            done

            pandoc /tmp/${region}_combined.md \
              --from markdown \
              --to pdf \
              --pdf-engine=weasyprint \
              --metadata title="Cultures - $(echo ${region} | sed 's/\b\(.\)/\u\1/g')" \
              --metadata date="$(date +%Y-%m-%d)" \
              -o dist/cultures-${region}.pdf
          done

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf

      - name: Upload as artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cultures-pdfs
          path: dist/*.pdf
          retention-days: 14

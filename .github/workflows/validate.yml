          ASSET_INFO=$(echo "$RELEASE" | python3 -c "import sys,json; a=next(x for x in json.load(sys.stdin)['assets'] if x['name'].endswith('.whl')); print(a['url'],a['name'])")
          ASSET_URL=$(echo "$ASSET_INFO" | cut -d' ' -f1)

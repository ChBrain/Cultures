name: validate

on:
  pull_request:
    branches: [main, culture/release]
  push:
    branches: [main, culture/release]

jobs:
  khai-encoding:
    name: khai - Encoding rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install khai-tests
        run: |
          ASSET_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.KAIHACKS }}" \
            https://api.github.com/repos/ChBrain/KAIHACKS/releases/tags/khai-tests-v0.1.0 \
            | python3 -c "import sys,json; print(next(a['url'] for a in json.load(sys.stdin)['assets'] if a['name'].endswith('.whl')))")
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.KAIHACKS }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o /tmp/khai_tests.whl
          pip install /tmp/khai_tests.whl
      - name: Run encoding tests
        run: python -m pytest --pyargs khai_tests.test_encoding --khai-roots=regions -v

  branch-scope-tests:
    name: Branch scope - test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        # Required for the E2E test: the hook now invokes
        # tests/validate_country_bag.py which imports PyYAML.
        run: pip install -r tests/requirements.txt
      - name: Run branch_scope unit + E2E tests
        run: python3 -m unittest tests.test_branch_scope tests.test_hook_scope_e2e -v

  branch-scope-mirror:
    name: Branch scope - enforce on PR diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check PR diff against branch scope rules
        env:
          BRANCH: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          git diff --name-only --diff-filter=ACMRT "origin/${BASE_REF}...HEAD" > /tmp/files.txt
          if [ ! -s /tmp/files.txt ]; then
            echo "No files changed; skipping scope check."
            exit 0
          fi
          python3 - <<'PY'
          import os, sys
          sys.path.insert(0, "tests")
          from branch_scope import classify_branch, check_scope
          branch = os.environ["BRANCH"]
          with open("/tmp/files.txt") as f:
              files = [l.strip() for l in f if l.strip()]
          kind = classify_branch(branch)
          if kind == "main":
              print(f"ERROR: PR head branch is main; impossible state.")
              sys.exit(1)
          ok, unsafe = check_scope(kind, files)
          if not ok:
              print(f"ERROR: branch '{branch}' (classified '{kind}') has scope violations:")
              for u in unsafe:
                  print(f"  - {u}")
              sys.exit(1)
          print(f"OK: branch '{branch}' (classified '{kind}') passes scope check ({len(files)} file(s)).")
          PY

  setup:
    name: Setup - Compute changed files
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.changed.outputs.any }}
      files: ${{ steps.changed.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed regions/*.md files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="HEAD~1"
            fi
            RANGE="$BEFORE..HEAD"
          fi
          # --diff-filter=ACMRT skips deletions; the validator must not be handed paths that no longer exist.
          FILES=$(git diff --name-only --diff-filter=ACMRT "$RANGE" | { grep -E '^regions/.*\.md$' || true; } | tr '\n' ' ' | sed 's/ *$//')
          ANY=$(if [ -z "$FILES" ]; then echo "false"; else echo "true"; fi)
          echo "any=$ANY" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

  L0-stamp-check:
    name: L0 - Validation stamp gate
    needs: [setup]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check validation stamp exists
        run: |
          if [ ! -f ".validation-stamp" ]; then
            echo "Γ¥î VALIDATION FAILED: .validation-stamp missing"
            echo ""
            echo "This file records that local validators passed before commit."
            echo "Run locally to generate it:"
            echo "  git config core.hooksPath .githooks"
            echo "  scripts/setup-hooks.sh  # or setup-hooks.bat on Windows"
            echo "  git commit --amend -m 'your message'"
            exit 1
          fi
          echo "Γ£ô Validation stamp present"

  L1-general:
    name: L1 - General file format
    needs: [setup, L0-stamp-check]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate general format
        run: python3 tests/validate_general.py ${{ needs.setup.outputs.files }}

  L1b-language:
    name: L1b - English-only language policy
    needs: [setup, L1-general]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lingua-language-detector
        run: pip install lingua-language-detector
      - name: Validate language policy
        run: python3 tests/validate_language.py ${{ needs.setup.outputs.files }}

  L2-sections:
    name: L2 - Section structure
    needs: [setup, L1b-language]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate section structure
        run: python3 tests/validate_sections.py ${{ needs.setup.outputs.files }}

  L3-links:
    name: L3 - Link integrity
    needs: [setup, L2-sections]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate link integrity
        run: python3 tests/validate_links.py ${{ needs.setup.outputs.files }}

  L4a-completeness:
    name: L4a - Culture completeness
    needs: [setup, L3-links]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate culture completeness
        run: python3 tests/validate_culture_completeness.py ${{ needs.setup.outputs.files }}

  L4b-audit-readme:
    name: L4b - Audit README status tables
    needs: [setup, L4a-completeness]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate audit README
        run: python3 tests/validate_audit_readme.py ${{ needs.setup.outputs.files }}

  L4c-audit-consistency:
    name: L4c - Audit table consistency
    needs: [setup, L4b-audit-readme]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate audit consistency
        run: python3 tests/validate_audit_consistency.py ${{ needs.setup.outputs.files }}

  L4d-plagiarism:
    name: L4d - IP/plagiarism heuristics
    needs: [setup, L4c-audit-consistency]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate plagiarism heuristics
        run: python3 tests/validate_plagiarism.py ${{ needs.setup.outputs.files }}

  L4e-hofstede-alignment:
    name: L4e - Hofstede dimension alignment
    needs: [setup, L4d-plagiarism]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r tests/requirements.txt
      - name: Validate Hofstede alignment
        run: python3 tests/validate_hofstede_alignment.py ${{ needs.setup.outputs.files }}

  L4f-hofstede-derived:
    name: L4f - Hofstede derived vs declared
    needs: [setup, L4e-hofstede-alignment]
    if: needs.setup.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r tests/requirements.txt
      - name: Validate Hofstede derived scores
        run: python3 tests/validate_hofstede_derived.py

  hofstede-bag-loader-tests:
    name: Hofstede - bag loader tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r tests/requirements.txt
      - name: Run loader tests
        run: python3 -m unittest tests.test_hofstede_bag_loader -v

  bag-integrity:
    name: Hofstede - bag integrity (shape, quality, lock, completeness, fork)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r tests/requirements.txt
      - name: Run bag integrity tests
        run: |
          python3 -m pytest tests/test_hofstede_bag_shape.py \
                            tests/test_hofstede_bag_quality.py \
                            tests/test_hofstede_bag_locked.py \
                            tests/test_hofstede_bag_completeness.py \
                            tests/test_hofstede_bag_fork.py \
                            -v

  no-changes:
    name: No regions/*.md files changed
    needs: [setup]
    if: needs.setup.outputs.any == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No regions/*.md files changed - skipping validation"

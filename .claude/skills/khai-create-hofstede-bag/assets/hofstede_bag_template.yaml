# Hofstede Bag: [Country]
#
# This file is the scoring contract for the country's Hofstede dimensions.
# Culture files (regions/<region>/<country>/culture_*.md) are written to
# carry these words organically. Each appearance of a bag word adds to the
# dimension's score; binary scoring (each word counts once).
#
# Schema (Strategy v2): country / language / parent / hofstede_scores / bags.
# Tests: tests/test_hofstede_bag_shape.py asserts all of these are present.

country: [country]              # lowercase slug, e.g. netherlands, ireland
language: [lang]                # ISO 639-1 code, e.g. nl, en, de, da
parent: null                    # null for canonical bag; "europe/scotland" if fork
status: draft                   # draft | reviewed | approved
generated: [YYYY-MM-DD]

hofstede_scores:
  PDI: [n]   # 0-100
  IDV: [n]
  UAI: [n]
  MAS: [n]
  LTO: [n]
  IND: [n]

# Country-specific denylist: words considered for this country's bags but
# rejected, with the rule that disqualified them. Combined at validation
# time with data/hofstede_denylist.yaml — a bag word must not appear in
# either denylist. Each entry's reason is documented in hofstede_decisions.md.
# Typical entries: cross-language collisions, dialect-specific issues,
# polysemy in this country's content, ambiguous polarity readings.
denylist:
  - word1
  - word2

bags:
  PDI:
    high:
      - word1
      - word2
      - word3
      - word4
      - word5
      - word6
      - word7
      - word8
      - word9
      - word10
    low:
